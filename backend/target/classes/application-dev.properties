# Dev/local profile: H2 database
spring.datasource.url=${H2_DATABASE_URL:jdbc:h2:file:./data/carbonlens-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${H2_DATABASE_USERNAME:sa}
spring.datasource.password=${H2_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

app.seed.enabled=${APP_SEED_ENABLED:true}
