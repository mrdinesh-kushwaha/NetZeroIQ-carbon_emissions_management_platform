# CarbonLens common configuration
spring.application.name=carbonlens
server.port=${PORT:8000}

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=${JWT_SECRET:change-this-local-development-secret-key-32-chars-minimum}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:28800000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Seed defaults; dev overrides can be set using environment variables
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.analyst-password=${APP_SEED_ANALYST_PASSWORD:analyst@1234}
app.seed.reviewer-password=${APP_SEED_REVIEWER_PASSWORD:reviewer@1234}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:admin@1234}

# Logging
logging.level.com.carbonlens=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN

#Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

